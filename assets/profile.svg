<svg width="800" height="380" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050510;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccccff;stop-opacity:1" />
    </linearGradient>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.15">
        <animate attributeName="offset" values="0;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <style>
    .card-bg { fill: url(#cardGradient); }
    .title { fill: url(#accentGradient); font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 72px; font-weight: 100; letter-spacing: -2px; }
    .subtitle { fill: #606080; font-family: 'SF Mono', 'Consolas', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; font-weight: 400; }
    .description { fill: #8888aa; font-family: 'SF Pro Text', -apple-system, sans-serif; font-size: 14px; font-weight: 300; }
    .stat-label { fill: #444466; font-family: 'SF Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400; }
    .stat-value { fill: #ffffff; font-family: 'SF Pro Display', -apple-system, sans-serif; font-size: 32px; font-weight: 100; letter-spacing: -1px; }
    .badge { fill: none; stroke: rgba(255, 255, 255, 0.06); stroke-width: 0.5; }
    .badge-text { fill: #9999bb; font-family: 'SF Mono', monospace; font-size: 10px; font-weight: 300; letter-spacing: 0.5px; }
    .divider { stroke: rgba(255, 255, 255, 0.08); stroke-width: 0.5; }
  </style>

  <rect class="card-bg" width="800" height="380" rx="20" ry="20"/>

  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="discrete" tableValues="0 0 0 0 0 0.01"/>
    </feComponentTransfer>
  </filter>
  <rect width="800" height="380" rx="20" filter="url(#noise)" opacity="0.3"/>

  <g transform="translate(60, 80)">
    <text y="0" class="subtitle">FULL-STACK DEVELOPER</text>
    <text y="65" class="title glow-text" filter="url(#textGlow)">PURE</text>
    
    <line x1="0" y1="85" x2="200" y2="85" class="divider">
      <animate attributeName="x2" values="0;200" dur="1.5s" fill="freeze"/>
    </line>
    
    <text y="115" class="description">16 year old developer</text>
    <text y="138" class="description" style="font-size: 12px; fill: #555577;">"Build. Break. Learn. Repeat."</text>
  </g>

  <g transform="translate(60, 240)">
    <rect class="badge" x="0" y="0" width="65" height="22" rx="11"/>
    <text class="badge-text" x="32.5" y="15" text-anchor="middle">Python</text>

    <rect class="badge" x="75" y="0" width="80" height="22" rx="11"/>
    <text class="badge-text" x="115" y="15" text-anchor="middle">JavaScript</text>

    <rect class="badge" x="165" y="0" width="80" height="22" rx="11"/>
    <text class="badge-text" x="205" y="15" text-anchor="middle">TypeScript</text>

    <rect class="badge" x="255" y="0" width="35" height="22" rx="11"/>
    <text class="badge-text" x="272.5" y="15" text-anchor="middle">Go</text>

    <rect class="badge" x="300" y="0" width="45" height="22" rx="11"/>
    <text class="badge-text" x="322.5" y="15" text-anchor="middle">Vite</text>

    <rect class="badge" x="355" y="0" width="60" height="22" rx="11"/>
    <text class="badge-text" x="385" y="15" text-anchor="middle">Node.js</text>
  </g>

  <g transform="translate(60, 285)">
    <text y="0" class="subtitle" style="font-size: 8px; letter-spacing: 3px;">CURRENTLY LEARNING</text>
    <rect class="badge" x="0" y="10" width="55" height="22" rx="11" stroke="rgba(255, 255, 255, 0.12)"/>
    <text class="badge-text" x="27.5" y="25" text-anchor="middle" fill="url(#accentGradient)" style="font-weight: 400;">Rust</text>
  </g>

  <g transform="translate(540, 80)">
    <g>
      <text y="20" class="stat-value">5+</text>
      <text y="40" class="stat-label">Projects</text>
      <line x1="0" y1="50" x2="40" y2="50" class="divider"/>
    </g>

    <g transform="translate(0, 80)">
      <text y="20" class="stat-value">4+</text>
      <text y="40" class="stat-label">Years</text>
      <line x1="0" y1="50" x2="35" y2="50" class="divider"/>
    </g>

    <g transform="translate(0, 160)">
      <text y="20" class="stat-value" style="font-size: 36px;">∞</text>
      <text y="40" class="stat-label">Passion</text>
      <line x1="0" y1="50" x2="40" y2="50" class="divider"/>
    </g>
  </g>

  <g opacity="0.15" stroke="#ffffff" stroke-width="0.5" fill="none">
    <path d="M 40 40 L 40 25 L 55 25"/>
    <path d="M 760 40 L 760 25 L 745 25"/>
    <path d="M 40 340 L 40 355 L 55 355"/>
    <path d="M 760 340 L 760 355 L 745 355"/>
  </g>

  <circle cx="730" cy="350" r="3" fill="url(#accentGradient)" opacity="0.3">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
